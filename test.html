<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pokegotchi</title>
    <meta
      name="description"
      content="Pokegotchi is a virtual pet game where you can raise and take care of your own Pokemon. Feed, play, and watch your Pokemon grow!"
    />
    <meta name="author" content="Mosberg" />

    <link rel="shortcut icon" href="src/img/favicon.webp" type="image/x-icon" />

    <link rel="stylesheet" href="src/css/styler.css" />
  </head>
  <body>
    <header>
      <img src="src/img/logo.png" alt="Pokegotchi Logo" />
    </header>

    <nav>
      <ul>
        <li><button id="nav-new-game">New Game</button></li>
        <li><button id="nav-save-game">Save Game</button></li>
        <li><button id="nav-load-game">Load Game</button></li>
        <li><button id="nav-settings">Settings</button></li>
      </ul>
    </nav>

    <aside>
      <h2>Your Party</h2>
      <div class="party-ui">
        <div class="party-slot" id="party-slot-1"></div>
        <div class="party-slot" id="party-slot-2"></div>
        <div class="party-slot" id="party-slot-3"></div>
        <div class="party-slot" id="party-slot-4"></div>
        <div class="party-slot" id="party-slot-5"></div>
        <div class="party-slot" id="party-slot-6"></div>
      </div>
    </aside>

    <main id="pokegotchi-ui">
      <section id="pokegotchi-game">
        <canvas id="game-canvas" width="256" height="256"></canvas>
      </section>

      <section id="pokegotchi-info">
        <h2 id="pokemon-name">No Pokémon</h2>
        <div id="pokemon-types"></div>
        <p id="pokemon-description"></p>
        <div class="stats">
          <div>Level: <span id="level-value">-</span> <span id="exp-bar"></span></div>
          <div>Hunger: <span id="hunger-value">-</span></div>
          <div>Happiness: <span id="happiness-value">-</span></div>
          <div>Age: <span id="age-value">-</span></div>
        </div>
        <div id="status-message"></div>
      </section>

      <section id="pokegotchi-controls">
        <div class="control-row">
          <button id="feed-button">Feed</button>
          <button id="play-button">Play</button>
          <button id="clean-button">Clean</button>
          <button id="sleep-button">Sleep</button>
        </div>
        <div class="control-row">
          <button id="train-button">Train</button>
          <button id="evolve-button">Evolve</button>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mosberg. All rights reserved.</p>
    </footer>

    <script src="src/js/settings.js"></script>
    <script src="src/js/notifications.js"></script>
    <script src="src/js/pokemon-data.js"></script>
    <script src="src/js/pokegotchi.js"></script>
    <script src="src/js/scripts.js"></script>
  </body>
</html>
